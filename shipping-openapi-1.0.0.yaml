openapi: 3.1.0
info:
  title: Shipping API
  version: 1.0.0
  description: This API allows to manage the shipping of products.
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
paths:
  /shipment:
    post:
      summary: Create a new shipment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShipmentRequest'
      responses:
        '201':
          description: Shipment created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShipmentResponse'
        '400':
          description: Invalid request
components:
  schemas:
    ShipmentRequest:
      type: object
      properties:
        orderId:
          type: string
          description: The ID of the order to ship
        address:
          type: object
          properties:
            customerId:
              type: string
              description: The ID of the customer
            city:
              type: string
              description: The city of the shipping address
            country:
              type: string
              description: The country of the shipping address
      required:
        - orderId
        - address
    ShipmentResponse:
      type: object
      properties:
        shipmentId:
          type: string
          description: The ID of the created shipment
        shipmentDate:
          type: string
          format: date-time
          description: The date and time when the shipment was created
        estimatedDeliveryDate:
          type: string
          format: date-time
          description: The estimated date and time when the shipment will be delivered
        status:
          type: string
          description: The status of the shipment (e.g. "pending", "shipped", "delivered")
          enum:
            - pending
            - shipped
            - delivered