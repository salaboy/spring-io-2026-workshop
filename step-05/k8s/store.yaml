apiVersion: apps/v1
kind: Deployment
metadata:
  name: store
spec:
  replicas: 1
  selector:
    matchLabels:
      app: store
  template:
    metadata:
      labels:
        app: store
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "store"
        dapr.io/app-port: "8080"
        dapr.io/config: "tracing"
        dapr.io/env: "OTEL_SERVICE_NAME=store-dapr"
        instrumentation.opentelemetry.io/inject-java: "opentelemetry/instrumentation"
    spec:
      containers:
        - name: store
          image: ghcr.io/salaboy/springio-store:step-04
          ports:
            - containerPort: 8080
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: anthropic-secret
                  key: api-key
            - name: WAREHOUSE_URL
              value: "http://warehouse:8086"
            - name: SHIPPING_URL
              value: "shipping:9091"
            - name: SPRING_AI_MCP_CLIENT_STREAMABLE_HTTP_CONNECTIONS_WAREHOUSE_MCP_URL
              value: "http://warehouse-mcp:8087"
---
apiVersion: v1
kind: Service
metadata:
  name: store
spec:
  selector:
    app: store
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
