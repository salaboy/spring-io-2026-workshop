spring.application.name=store
spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY}

spring.ai.chat.observations.log-prompt=true
spring.ai.chat.observations.log-completion=true
spring.ai.chat.observations.include-error-logging=true
spring.ai.chat.client.observations.log-prompt=true
spring.ai.chat.client.observations.log-completion=true

otel.service.name=${spring.application.name}

management.tracing.baggage.correlation.enabled=true
management.tracing.baggage.enabled=true
management.opentelemetry.tracing.export.include-unsampled=true
management.tracing.sampling.probability=1.0
management.tracing.export.enabled=true
management.opentelemetry.tracing.export.otlp.transport=http
management.opentelemetry.tracing.export.schedule-delay=1s
management.tracing.export.otlp.enabled=true
management.endpoints.web.exposure.include=*