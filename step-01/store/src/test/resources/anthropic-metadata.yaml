# yaml-language-server: $schema= https://microcks.io/schemas/APIExamples-v1alpha1-schema.json
apiVersion: mocks.microcks.io/v1alpha1
kind: APIMetadata
metadata:
  name: Anthropic API
  version: '0.83.0'
operations:
  'POST /v1/messages':
    dispatcher: JS
    dispatcherRules: |-
      const body = JSON.parse(mockRequest.requestContent());
      let firstContent = body.messages && body.messages.length > 0 ? body.messages[0].content : null;
      if (firstContent && firstContent.startsWith('List')) {
        log.info("Messages length: " + body.messages.length);
        if (body.messages.length === 1) {
            return "List inventory";
        }
        return "List inventory results";
      } 
      return "List inventory";