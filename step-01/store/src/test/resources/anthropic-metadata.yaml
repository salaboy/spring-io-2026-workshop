# yaml-language-server: $schema= https://microcks.io/schemas/APIExamples-v1alpha1-schema.json
apiVersion: mocks.microcks.io/v1alpha1
kind: APIMetadata
metadata:
  name: Anthropic API
  version: '0.83.0'
operations:
  'POST /v1/messages':
    dispatcher: JS
    dispatcherRules: |-
      const body = JSON.parse(mockRequest.requestContent());
      let firstContent = body.messages && body.messages.length > 0 ? body.messages[0].content : null;
      if (firstContent) {
        if (firstContent.startsWith('List')) {
          if (body.messages.length === 1) {
            return "List inventory";
          }
          return "List inventory results";
        } else if (firstContent.includes('everything under $') 
            || firstContent.includes('cheapest item') 
            || firstContent.includes('items between $')) {
          if (body.messages.length === 1) {
            return "Find by price";
          }
          if (firstContent.includes('everything under $')) {
            return "Find by price results - under";
          } else if (firstContent.includes('cheapest item')) {
            return "Find by price results - cheapest";
          } else if (firstContent.includes('items between $')) {
            return "Find by price results - range";
          }
          return "Find by price results - range";
        }
      }
      return "List inventory";